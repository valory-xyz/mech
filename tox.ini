commands =
    flake8 --config={envsitepackagesdir}/tomte/configs/flake8.cfg {env:SERVICE_SPECIFIC_PACKAGES}

[testenv:mypy]
; Concat trick: tomte canonical mypy.ini + this repo's tox.ini → merged
; file in {envtmpdir}, then point mypy at it. mypy reads `[mypy*]`
; sections from any ini, so the [mypy-<lib>] blocks at the bottom of
; this tox.ini layer onto canonical without duplicating global flags.
skipsdist = True
skip_install = True
deps =
    pip
    tomte[mypy] @ git+https://github.com/valory-xyz/tomte.git@08e9cd419cc8ec62a176b462baf7737332138dee
commands_pre =
    python -c "from tomte.configs import MYPY_INI; from pathlib import Path; Path(r'{envtmpdir}/mypy.ini').write_text(MYPY_INI.read_text() + '\n' + Path('tox.ini').read_text())"
commands =
    mypy --config-file={envtmpdir}/mypy.ini --disallow-untyped-defs {env:SERVICE_SPECIFIC_PACKAGES}

[testenv:pylint]
; Pylint reads exactly one rcfile. Point at tomte canonical and pass
; mech-specific extras as CLI flags. Per David's review on
; valory-xyz/tomte#46, tomte's canonical pylintrc carries no
; downstream library names — `--ignored-modules=` lists the libraries
; mech actually imports.
whitelist_externals = /bin/sh
skipsdist = True
deps =
    {[deps-packages]deps}
    tomte[pylint] @ git+https://github.com/valory-xyz/tomte.git@08e9cd419cc8ec62a176b462baf7737332138dee
commands = pylint --rcfile={envsitepackagesdir}/tomte/configs/pylintrc --ignore-paths="^packages/valory/.*$" --ignored-modules=pandas,numpy,aea_cli_ipfs,compose,multidict,gql,anthropic,tiktoken {env:SERVICE_SPECIFIC_PACKAGES}

[testenv:safety]
skipsdist = True
skip_install = True
deps =
    tomte[safety] @ git+https://github.com/valory-xyz/tomte.git@08e9cd419cc8ec62a176b462baf7737332138dee
commands = safety check --policy-file {envsitepackagesdir}/tomte/configs/safety-policy.yml

[testenv:darglint]
skipsdist = True
skip_install = True
deps =
    tomte[darglint] @ git+https://github.com/valory-xyz/tomte.git@08e9cd419cc8ec62a176b462baf7737332138dee
commands = darglint --config-file={envsitepackagesdir}/tomte/configs/darglint.cfg {env:SERVICE_SPECIFIC_PACKAGES}/*

[testenv:gitleaks]
; Replaces the per-repo `.gitleaks.toml` with the tomte canonical.
skipsdist = True
skip_install = True
deps =
    tomte[cli] @ git+https://github.com/valory-xyz/tomte.git@08e9cd419cc8ec62a176b462baf7737332138dee
allowlist_externals = gitleaks
commands = gitleaks detect --config={envsitepackagesdir}/tomte/configs/gitleaks.toml --no-git -v

[testenv:check-generate-all-protocols]
skipsdist = True
usedevelop = True
deps =
    {[deps-packages]deps}
    tomte[isort] @ git+https://github.com/valory-xyz/tomte.git@08e9cd419cc8ec62a176b462baf7737332138dee
    tomte[black] @ git+https://github.com/valory-xyz/tomte.git@08e9cd419cc8ec62a176b462baf7737332138dee
commands = autonomy generate-all-protocols --check-clean

[testenv:abci-docstrings]
skipsdist = True
usedevelop = True
commands = autonomy analyse docstrings --update

[testenv:check-abci-docstrings]
skipsdist = True
usedevelop = True
commands = autonomy analyse docstrings

[testenv:check-abciapp-specs]
skipsdist = True
