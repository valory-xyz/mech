; By default, testenvs are configured to:
; - don't skip dist (skipsdist = False)
; - don't skip the package installation (skip_install = False)
; - don't use source installation (usedevelop = False)
; where one of those steps is not necessary for the test,
; we set the associated flag (e.g. for linting we don't need
; the package installation).
[tox]
envlist = bandit, safety, black, black-check, isort, isort-check, check-hash, check-packages, check-dependencies, flake8, mypy, pylint, darglint, check-generate-all-protocols, check-abciapp-specs, check-abci-docstrings, check-handlers, py{3.10,3.11}-{win,linux,darwin}
; when running locally we don't want to fail for no good reason
skip_missing_interpreters = true
isolated_build = True
; tox-uv: seed venvs with pip (needed by aea CLI which imports pip._internal)
uv_seed = true

[deps-tests]
deps =
    pip
    tomte[tests] @ git+https://github.com/valory-xyz/tomte.git@08e9cd419cc8ec62a176b462baf7737332138dee

[deps-packages]
deps =
    {[deps-tests]deps}
    open-autonomy[all]==0.21.19
    open-aea-ledger-ethereum==2.2.1
    open-aea-ledger-cosmos==2.2.1
    open-aea-test-autonomy==0.21.19
    open-aea-cli-ipfs==2.2.1
    open-aea-helpers==0.21.19
    requests>=2.32.5
    grpcio==1.78.0
    asn1crypto<1.5.0,>=1.4.0
    protobuf<7,>=5
    hypothesis>=6
    web3<8,>=7.0.0
    pytest-asyncio>=1.3
    aiohttp<4.0.0,>=3.8.5
    certifi
    multidict
    ecdsa>=0.15
    py-ecc<10,>=8
    websocket_client<1,>=0.32.0
    pytest>=8.2,<10
    openai==1.30.2
    openapi-core<0.23,>=0.22
    openapi-spec-validator>=0.7.0,<0.8.0
    setuptools<81.0.0
    pebble>=5.1,<6
    PyYAML>=6
    prometheus_client>=0.23.1,<0.24
    # Third-party YAML deps (http_server/connection.yaml declares these).
    werkzeug==3.1.6
    attrs==25.4.0

[testenv]
whitelist_externals = /bin/sh
deps = {[deps-packages]deps}
passenv = *
setenv =
    UV_PRERELEASE=allow
    PYTHONHASHSEED=0
    PYTHONPATH={env:PWD:%CD%}
    PACKAGES_PATHS = packages/valory
    SKILLS_PATHS = {env:PACKAGES_PATHS}/skills
    SERVICE_SPECIFIC_PACKAGES = {env:PACKAGES_PATHS}/connections/websocket_client {env:PACKAGES_PATHS}/contracts/balance_tracker {env:PACKAGES_PATHS}/contracts/complementary_service_metadata {env:PACKAGES_PATHS}/contracts/hash_checkpoint {env:PACKAGES_PATHS}/contracts/olas_mech {env:SKILLS_PATHS}/contract_subscription {env:SKILLS_PATHS}/delivery_rate_abci {env:SKILLS_PATHS}/mech_abci {env:SKILLS_PATHS}/task_execution {env:SKILLS_PATHS}/task_submission_abci {env:SKILLS_PATHS}/websocket_client

