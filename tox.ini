    pip
    tomte[liccheck,cli] @ git+https://github.com/valory-xyz/tomte.git@08e9cd419cc8ec62a176b462baf7737332138dee
    typing-extensions==4.15
    setuptools<81.0.0
commands =
    tomte freeze-dependencies --output-path {envtmpdir}/requirements.txt
    liccheck -s tox.ini -r {envtmpdir}/requirements.txt -l PARANOID

[testenv:analyse-service]
skipsdist = True
usedevelop = True
commands = autonomy analyse service --public-id valory/mech --skip-warnings

[flake8]
paths=packages
exclude=.md,
    *_pb2.py,
    *_pb2_grpc.py,
    custom_types.py,

max-line-length = 88
select = B,C,D,E,F,I,W,
; I003 to avoid conflicts with isort
ignore = E203,E501,W503,D202,B014,D400,D401,DAR,I001,I005
application-import-names = packages,tests

# ignore as too restrictive for our needs:
# D400: First line should end with a period
# D401: First line should be in imperative mood
# E501: https://www.flake8rules.com/rules/E501.html (Line too long)
# E203: https://www.flake8rules.com/rules/E203.html (Whitespace)
# W503: https://www.flake8rules.com/rules/W503.html (Line break)
# D202: blank lines
# B014: redundant exception

[isort]
# for black compatibility
profile=black
multi_line_output=3
include_trailing_comma=True
force_grid_wrap=0
use_parentheses=True
ensure_newline_before_comments = True
line_length=88
# custom configurations
order_by_type=False
case_sensitive=True
lines_after_imports=-1
skip=packages/valory/skills/abstract_round_abci/test_tools/integration.py,packages/valory/skills/transaction_settlement_abci/test_tools/integration.py
skip_glob =
known_first_party=autonomy
known_packages=packages
known_local_folder=tests
sections=FUTURE,STDLIB,THIRDPARTY,FIRSTPARTY,PACKAGES,LOCALFOLDER

; -- mypy per-module overrides ---------------------------------------------
; Global [mypy] flags + protobuf/custom_types exclude regex come from
; tomte canonical (mypy.ini in tomte/configs/). [testenv:mypy] above
; concatenates that canonical with this tox.ini, so the per-module
; blocks below layer on top. Per David's review on tomte#46:
; downstream library knowledge stays in the consuming repo.

[mypy-aea.*]
ignore_missing_imports = True

[mypy-anthropic.*]
ignore_missing_imports = True

[mypy-tiktoken.*]
ignore_missing_imports = True

[mypy-packages.open_aea.*]
ignore_errors=True

[mypy-packages.valory.connections.*]
ignore_errors=True

[mypy-packages.valory.contracts.*]
ignore_errors=True
ignore_missing_imports=True

