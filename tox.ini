; By default, testenvs are configured to:
; - don't skip dist (skipsdist = False)
; - don't skip the package installation (skip_install = False)
; - don't use source installation (usedevelop = False)
; where one of those steps is not necessary for the test,
; we set the associated flag (e.g. for linting we don't need
; the package installation).
[tox]
envlist = bandit, safety, black, black-check, isort, isort-check, check-hash, check-packages, check-dependencies, flake8, mypy, pylint, darglint, check-generate-all-protocols, check-abciapp-specs, check-abci-docstrings, check-handlers, py{3.10,3.11,3.12,3.13,3.14}-{win,linux,darwin}, py3.12-integration-linux
; when running locally we don't want to fail for no good reason
skip_missing_interpreters = true
isolated_build = True
; tox-uv: seed venvs with pip (needed by aea CLI which imports pip._internal)
uv_seed = true

[deps-tests]
deps =
    pip
    tomte[tests]==0.6.2

[deps-packages]
deps =
    {[deps-tests]deps}
    open-autonomy==0.21.16
    fastapi==0.110.3
    openai==1.30.2
    requests==2.32.5
    py-multibase==1.0.3
    py-multicodec==0.2.1
