    asn1crypto<1.5.0,>=1.4.0
    open-aea-ledger-ethereum==2.1.0
    open-aea-ledger-cosmos==2.1.0
    protobuf>=5,<6
    hypothesis==6.151.9
    open-aea-test-autonomy==0.21.16
    web3<8,>=7.0.0
    ipfshttpclient==0.8.0a2
    open-aea-cli-ipfs==2.1.0
    pytest-asyncio==1.3.0
    aiohttp<4.0.0,>=3.8.5
    certifi==2026.2.25
    multidict==6.7.1
    ecdsa>=0.15
    eth_typing==5.2.1
    hexbytes==1.3.1
    packaging==26
    py-ecc==8.0.0
    pytz==2022.2.1
    typing-extensions<=4.15.0,>=3.10.0.2
    websocket_client<1,>=0.32.0
    toml==0.10.2
    googlesearch-python==1.2.3
    beautifulsoup4==4.12.2
    google-api-python-client==2.95.0
    eth-utils==5.3.0
    eth-abi==5.2.0
    pycryptodome==3.20.0
    openapi-core==0.22.0
    anthropic>=0.23.1
    langchain==1.2.10
    langchain-core==1.2.17
    langchain-text-splitters==1.1.1
    langchain-tavily==0.2.17
    langgraph==1.0.10
    pytest>=8.2,<10
    jsonschema<4.24.0,>=4.20.0
    pandas==2.3.3
    tiktoken==0.12.0
    python-dateutil==2.8.2
    pypdf2>=3.0.1,<4.0.0
    lxml==6.0.2
    moviepy==1.0.3
    replicate==0.15.7
    google-generativeai==0.8.6
    google-api-core>=2.20.0
