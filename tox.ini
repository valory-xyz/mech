; Local extensions to tomte's canonical tox.ini. Consumed by `tomte tox`.

[tomte-extensions]
; Most runtime deps auto-mirror from [project].dependencies. Listed here
; are (a) lint-time-only extras NOT in pyproject (werkzeug, attrs) and
; (b) range-form overrides for runtime deps where the corresponding
; package YAML uses a range expression — `aea-helpers
; check-dependencies` does string-strict matching so the form must
; agree on both sides. Drop these once the YAMLs are converted to
; strict pins.
extra_deps =
    protobuf<7,>=5
    openapi-core<0.23,>=0.22
    openapi-spec-validator<0.8.0,>=0.7.0
    pebble>=5.1,<6
    prometheus_client>=0.23.1,<0.24
    web3<8,>=7.0.0
    aiohttp<4.0.0,>=3.8.5
    asn1crypto<1.5.0,>=1.4.0
    py-ecc<10,>=8
    websocket_client<1,>=0.32.0
    werkzeug==3.1.6
    attrs==25.4.0

extra_pylint_ignored_modules = pandas,numpy,aea_cli_ipfs,compose,multidict,gql

[mypy]
warn_unused_ignores = False
warn_redundant_casts = False
disable_error_code = redundant-cast,unused-ignore

; Repo-specific overrides (third-party packages synced via IPFS, not lint-clean).
[mypy-packages.valory.connections.*]
ignore_errors = True

[mypy-packages.valory.contracts.*]
ignore_errors = True
ignore_missing_imports = True

[mypy-packages.valory.protocols.*]
ignore_errors = True

[mypy-packages.valory.skills.abstract_abci.*]
ignore_errors = True

[mypy-packages.valory.skills.abstract_round_abci.*]
ignore_errors = True

[mypy-packages.valory.skills.registration_abci.*]
ignore_errors = True
