;
; Canonical tox configuration for Valory AEA-agent repos.
; Repo-specific overrides come from `[tool.tomte.scaffold]` in
; pyproject.toml. Re-run `tomte scaffold tox` after bumping tomte to
; pick up new defaults.
;
; Substitution variables (filled by the scaffolder):
;   $TOMTE_VERSION                 e.g. 0.7.0
;   $OPEN_AUTONOMY_VERSION         e.g. 0.21.19
;   $OPEN_AEA_VERSION              e.g. 2.2.1
;   $PACKAGES_PATHS                e.g. packages/valory
;   $SKILLS_PATHS                  e.g. packages/valory/skills
;   $SERVICE_SPECIFIC_PACKAGES     space-separated list, see [tool.tomte.scaffold]
;   $KNOWN_FIRST_PARTY             isort known_first_party (e.g. autonomy)
;   $SERVICE_PUBLIC_ID             e.g. valory/mech (used by analyse-service)
;   $PYTEST_TARGETS                space-separated pytest paths
;   $EXTRA_DEPS_PACKAGES           multi-line; appended to [deps-packages]
;   $EXTRA_TESTENVS                multi-line; appended after the canonical envs
;   $UPSTREAM_PINS                 multi-line --upstream args for check-third-party-hashes
;   $EXTRA_PYLINT_FLAGS            pre-rendered pylint extension CLI flags
;                                   (e.g. "--ignored-modules=web3 --disable=C0111"),
;                                   or empty when no extras declared
;   $EXTRA_MYPY_OVERRIDES          repo-specific [mypy-<lib>] sections,
;                                   appended at the bottom of this file
;   $TOMTE_DEP_PIN                 PEP 508 spec right of `tomte[<extras>]`,
;                                   typically `==0.7.0` or ` @ git+...`

[tox]
envlist = bandit, safety, black, black-check, isort, isort-check, check-hash, check-packages, check-dependencies, flake8, mypy, pylint, darglint, check-abciapp-specs, check-abci-docstrings, check-handlers, check-generate-all-protocols, py{3.10,3.11,3.12,3.13,3.14}-{linux,darwin,win}
skip_missing_interpreters = true
isolated_build = True
; tox-uv: seed venvs with pip (autonomy CLI imports pip._internal)
uv_seed = true

[deps-tests]
deps =
    pip
    tomte[tests]@ git+https://github.com/valory-xyz/tomte.git@afa26e0ac54f2c396b74bb90f4d605829fb30a04

[deps-packages]
deps =
    {[deps-tests]deps}
    open-autonomy[all]==0.21.19
    open-aea-ledger-ethereum==2.2.1
    open-aea-ledger-cosmos==2.2.1
    open-aea-test-autonomy==0.21.19
    open-aea-cli-ipfs==2.2.1
    open-aea-helpers==0.21.19
    requests>=2.32.5
    grpcio==1.78.0
    asn1crypto<1.5.0,>=1.4.0
    protobuf<7,>=5
    hypothesis>=6
    web3<8,>=7.0.0
    pytest-asyncio>=1.3
    aiohttp<4.0.0,>=3.8.5
    certifi
    multidict
    ecdsa>=0.15
    py-ecc<10,>=8
    websocket_client<1,>=0.32.0
    pytest>=8.2,<10
    openai==1.30.2
    openapi-core<0.23,>=0.22
    openapi-spec-validator>=0.7.0,<0.8.0
    setuptools<81.0.0
    pebble>=5.1,<6
    PyYAML>=6
    prometheus_client>=0.23.1,<0.24
    werkzeug==3.1.6
    attrs==25.4.0

[testenv]
allowlist_externals = /bin/sh
deps = {[deps-packages]deps}
passenv = *
setenv =
    UV_PRERELEASE=allow
    PYTHONHASHSEED=0
    PYTHONPATH={env:PWD:%CD%}
    PACKAGES_PATHS = packages/valory
    SKILLS_PATHS = packages/valory/skills
    SERVICE_SPECIFIC_PACKAGES = packages/valory/connections/websocket_client packages/valory/contracts/balance_tracker packages/valory/contracts/complementary_service_metadata packages/valory/contracts/hash_checkpoint packages/valory/contracts/olas_mech packages/valory/skills/contract_subscription packages/valory/skills/delivery_rate_abci packages/valory/skills/mech_abci packages/valory/skills/task_execution packages/valory/skills/task_submission_abci packages/valory/skills/websocket_client
commands =
    autonomy init --reset --author ci --remote --ipfs --ipfs-node "/dns/registry.autonolas.tech/tcp/443/https"
    autonomy packages sync
    pytest -rfE packages/valory/skills/mech_abci/tests packages/valory/skills/task_submission_abci/tests packages/valory/skills/task_execution/tests --cov-report=xml --cov-report=term --cov-report=term-missing --cov-config=.coveragerc {posargs}

[testenv:py{3.10,3.11,3.12,3.13,3.14}-linux]
platform = ^linux$

[testenv:py{3.10,3.11,3.12,3.13,3.14}-darwin]
platform = ^darwin$

[testenv:py{3.10,3.11,3.12,3.13,3.14}-win]
platform = ^win32$

; -- linters --------------------------------------------------------------

[testenv:bandit]
skipsdist = True
skip_install = True
deps = tomte[bandit]@ git+https://github.com/valory-xyz/tomte.git@afa26e0ac54f2c396b74bb90f4d605829fb30a04
commands =
    bandit -c {envsitepackagesdir}/tomte/configs/bandit.yaml -r {env:SERVICE_SPECIFIC_PACKAGES}

[testenv:black]
skipsdist = True
skip_install = True
deps = tomte[black]@ git+https://github.com/valory-xyz/tomte.git@afa26e0ac54f2c396b74bb90f4d605829fb30a04
commands = black {env:SERVICE_SPECIFIC_PACKAGES}

[testenv:black-check]
skipsdist = True
skip_install = True
deps = tomte[black]@ git+https://github.com/valory-xyz/tomte.git@afa26e0ac54f2c396b74bb90f4d605829fb30a04
commands = black --check {env:SERVICE_SPECIFIC_PACKAGES}

[testenv:isort]
skipsdist = True
skip_install = True
deps = tomte[isort,cli]@ git+https://github.com/valory-xyz/tomte.git@afa26e0ac54f2c396b74bb90f4d605829fb30a04
commands_pre = tomte render-isort-config --output={envtmpdir}/isort.cfg --known-first-party=autonomy --known-packages=packages --known-local-folder=tests
commands = isort --gitignore --settings-path={envtmpdir}/isort.cfg {env:SERVICE_SPECIFIC_PACKAGES}

[testenv:isort-check]
skipsdist = True
skip_install = True
deps = tomte[isort,cli]@ git+https://github.com/valory-xyz/tomte.git@afa26e0ac54f2c396b74bb90f4d605829fb30a04
commands_pre = tomte render-isort-config --output={envtmpdir}/isort.cfg --known-first-party=autonomy --known-packages=packages --known-local-folder=tests
commands = isort --check-only --gitignore --settings-path={envtmpdir}/isort.cfg {env:SERVICE_SPECIFIC_PACKAGES}

[testenv:flake8]
skipsdist = True
skip_install = True
deps = tomte[flake8]@ git+https://github.com/valory-xyz/tomte.git@afa26e0ac54f2c396b74bb90f4d605829fb30a04
commands =
    flake8 --config={envsitepackagesdir}/tomte/configs/flake8.cfg \
        {env:SERVICE_SPECIFIC_PACKAGES}

[testenv:mypy]
skipsdist = True
skip_install = True
deps =
    pip
    tomte[mypy,cli]@ git+https://github.com/valory-xyz/tomte.git@afa26e0ac54f2c396b74bb90f4d605829fb30a04
commands_pre = tomte render-mypy-config --output={envtmpdir}/mypy.ini --append-from=tox.ini
commands = mypy --config-file={envtmpdir}/mypy.ini --disallow-untyped-defs {env:SERVICE_SPECIFIC_PACKAGES}

[testenv:pylint]
skipsdist = True
deps =
    {[deps-packages]deps}
    tomte[pylint]@ git+https://github.com/valory-xyz/tomte.git@afa26e0ac54f2c396b74bb90f4d605829fb30a04
commands =
    pylint --rcfile={envsitepackagesdir}/tomte/configs/pylintrc \
        --ignore-paths="^packages/valory/.*$" --ignored-modules=pandas,numpy,aea_cli_ipfs,compose,multidict,gql,anthropic,tiktoken \
        {env:SERVICE_SPECIFIC_PACKAGES}

[testenv:darglint]
; darglint has no --config-file flag; settings live in [darglint] at
; the bottom of this tox.ini.
skipsdist = True
skip_install = True
deps = tomte[darglint]@ git+https://github.com/valory-xyz/tomte.git@afa26e0ac54f2c396b74bb90f4d605829fb30a04
commands =
    darglint {env:SERVICE_SPECIFIC_PACKAGES}/*

[testenv:safety]
skipsdist = True
skip_install = True
deps = tomte[safety]@ git+https://github.com/valory-xyz/tomte.git@afa26e0ac54f2c396b74bb90f4d605829fb30a04
commands =
    safety check --policy-file {envsitepackagesdir}/tomte/configs/safety-policy.yml

; -- autonomy / aea checks -----------------------------------------------

[testenv:check-hash]
skipsdist = True
usedevelop = True
deps =
    pip
    open-autonomy[all]==0.21.19
commands =
    autonomy init --reset --author ci --remote --ipfs --ipfs-node "/dns/registry.autonolas.tech/tcp/443/https"
    autonomy packages sync
    autonomy packages lock --check

[testenv:check-packages]
skipsdist = True
usedevelop = True
deps = {[deps-packages]deps}
commands =
    autonomy init --reset --author ci --remote --ipfs --ipfs-node "/dns/registry.autonolas.tech/tcp/443/https"
    autonomy packages sync
    autonomy check-packages

[testenv:check-dependencies]
skipsdist = True
usedevelop = True
commands =
    autonomy packages sync
    aea-helpers check-dependencies --check --exclude requests --exclude pyyaml --exclude PyYAML

[testenv:check-third-party-hashes]
skipsdist = True
skip_install = True
deps =
    open-aea==2.2.1
    open-aea-ci-helpers==2.2.1
commands =
    aea-ci check-third-party-hashes --upstream valory-xyz/open-autonomy@0.21.19 --upstream valory-xyz/open-aea@2.2.1

[testenv:check-abciapp-specs]
skipsdist = True
usedevelop = True
commands =
    autonomy init --reset --author ci --remote --ipfs --ipfs-node "/dns/registry.autonolas.tech/tcp/443/https"
    autonomy packages sync --third-party
    autonomy analyse fsm-specs

[testenv:check-generate-all-protocols]
skipsdist = True
usedevelop = True
deps =
    {[deps-packages]deps}
    tomte[isort]@ git+https://github.com/valory-xyz/tomte.git@afa26e0ac54f2c396b74bb90f4d605829fb30a04
    tomte[black]@ git+https://github.com/valory-xyz/tomte.git@afa26e0ac54f2c396b74bb90f4d605829fb30a04
commands = autonomy generate-all-protocols --check-clean

[testenv:abci-docstrings]
skipsdist = True
usedevelop = True
commands = autonomy analyse docstrings --update

[testenv:check-abci-docstrings]
skipsdist = True
usedevelop = True
commands = autonomy analyse docstrings

[testenv:check-handlers]
skipsdist = True
usedevelop = True
deps =
    pip
    open-autonomy[all]==0.21.19
commands =
    autonomy analyse handlers -h abci -h http -h contract_api -h ledger_api -h signing -i abstract_abci -i contract_subscription -i task_execution -i websocket_client

[testenv:check-doc-hashes]
skipsdist = True
skip_install = True
commands =
    aea init --reset --author ci --remote --ipfs --ipfs-node "/dns/registry.autonolas.tech/tcp/443/https"
    aea packages sync
    aea-helpers check-doc-hashes

[testenv:fix-doc-hashes]
skipsdist = True
skip_install = True
commands = aea-helpers check-doc-hashes --fix

[testenv:liccheck]
; liccheck imports pkg_resources from setuptools. tox-uv strips
; setuptools by default; setuptools 81+ removed pkg_resources.
skipsdist = True
usedevelop = True
deps =
    pip
    setuptools<81
    tomte[liccheck,cli]@ git+https://github.com/valory-xyz/tomte.git@afa26e0ac54f2c396b74bb90f4d605829fb30a04
commands =
    tomte freeze-dependencies --output-path {envtmpdir}/requirements.txt
    liccheck -s tox.ini -r {envtmpdir}/requirements.txt -l PARANOID

[testenv:analyse-service]
skipsdist = True
usedevelop = True
commands = autonomy analyse service --public-id valory/mech --skip-warnings



