    aea-helpers==0.21.16

[testenv]
allowlist_externals = /bin/sh
deps = {[deps-packages]deps}
passenv = *
setenv =
    UV_PRERELEASE=allow
    PYTHONHASHSEED=0
    PYTHONPATH={env:PWD:%CD%}
    PACKAGES_PATHS = packages
    DVILELA_PACKAGES = {env:PACKAGES_PATHS}/dvilela
    NAPTHAAI_PACKAGES = {env:PACKAGES_PATHS}/napthaai
    NICKCOM007_PACKAGES = {env:PACKAGES_PATHS}/nickcom007
    VALORY_PACKAGES = {env:PACKAGES_PATHS}/valory
    VISTORPOLISETTY_PACKAGES = {env:PACKAGES_PATHS}/victorpolisetty
    CUSTOMS_FOLDER = customs
    CUSTOMS_PATHS = {env:DVILELA_PACKAGES}/{env:CUSTOMS_FOLDER} {env:NAPTHAAI_PACKAGES}/{env:CUSTOMS_FOLDER} {env:NICKCOM007_PACKAGES}/{env:CUSTOMS_FOLDER} {env:VALORY_PACKAGES}/{env:CUSTOMS_FOLDER} {env:VISTORPOLISETTY_PACKAGES}/{env:CUSTOMS_FOLDER}
    SERVICE_SPECIFIC_PACKAGES = {env:CUSTOMS_PATHS}

[testenv:bandit]
skipsdist = True
skip_install = True
