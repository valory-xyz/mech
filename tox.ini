; Local extensions to tomte's canonical tox.ini. Consumed by `tomte tox`.

[tomte-extensions]
extra_deps =
    requests>=2.32.5
    grpcio==1.78.0
    asn1crypto<1.5.0,>=1.4.0
    protobuf<7,>=5
    hypothesis>=6
    web3<8,>=7.0.0
    pytest-asyncio>=1.3
    aiohttp<4.0.0,>=3.8.5
    certifi
    multidict
    ecdsa>=0.15
    py-ecc<10,>=8
    websocket_client<1,>=0.32.0
    pytest>=8.2,<10
    openai==1.30.2
    openapi-core<0.23,>=0.22
    openapi-spec-validator>=0.7.0,<0.8.0
    setuptools<81.0.0
    pebble>=5.1,<6
    PyYAML>=6
    prometheus_client>=0.23.1,<0.24
    werkzeug==3.1.6
    attrs==25.4.0

extra_pylint_ignored_modules = pandas,numpy,aea_cli_ipfs,compose,multidict,gql,anthropic,tiktoken

[mypy]
warn_unused_ignores = False
warn_redundant_casts = False
disable_error_code = redundant-cast,unused-ignore

[mypy-aea.*]
ignore_missing_imports = True

[mypy-anthropic.*]
ignore_missing_imports = True

[mypy-tiktoken.*]
ignore_missing_imports = True

[mypy-packages.open_aea.*]
ignore_errors = True

[mypy-packages.valory.connections.*]
ignore_errors = True

[mypy-packages.valory.contracts.*]
ignore_errors = True
ignore_missing_imports = True

[mypy-packages.valory.protocols.*]
ignore_errors = True

[mypy-packages.valory.skills.abstract_abci.*]
ignore_errors = True

[mypy-packages.valory.skills.abstract_round_abci.*]
ignore_errors = True

[mypy-packages.valory.skills.registration_abci.*]
ignore_errors = True

[mypy-requests]
ignore_missing_imports = True

[mypy-yaml]
ignore_missing_imports = True

[mypy-aea_test_autonomy.*]
ignore_missing_imports = True

[mypy-statsmodels.*]
ignore_missing_imports = True

[mypy-_pytest.*]
ignore_missing_imports = True

[mypy-aea_ledger_ethereum.*]
ignore_missing_imports = True

[mypy-pytest]
ignore_missing_imports = True

[mypy-hypothesis.*]
ignore_missing_imports = True

[mypy-docker.*]
ignore_missing_imports = True

[mypy-certifi.*]
ignore_missing_imports = True

[mypy-pandas.*]
ignore_missing_imports = True

[mypy-aea_cli_ipfs.*]
ignore_missing_imports = True

[mypy-web3.*]
ignore_missing_imports = True

[mypy-openai.*]
ignore_missing_imports = True

[mypy-click.*]
ignore_missing_imports = True

[mypy-autonomy.*]
ignore_missing_imports = True

[mypy-pebble.*]
ignore_missing_imports = True

[mypy-prometheus_client.*]
ignore_missing_imports = True
