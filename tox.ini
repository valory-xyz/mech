; Local extensions to tomte's canonical tox.ini. Consumed by `tomte tox`.

[tomte-extensions]
; Lint-only extras not in [project].dependencies (werkzeug, attrs) and
; range-form overrides for runtime deps where a service-specific skill
; YAML still pins strictly (e.g. task_execution pins pebble ==5.1.3 but
; agent YAML uses <6,>=5.1). `aea-helpers check-dependencies` does
; string-strict matching, so the form must agree across all three of
; pyproject / package YAMLs / this section. Drop entries once the
; corresponding skill YAMLs adopt the range form.
extra_deps =
    eth-utils==6.0.0
    protobuf<7,>=5
    openapi-core<0.23,>=0.22
    openapi-spec-validator<0.8.0,>=0.7.0
    pebble<6,>=5.1
    prometheus_client<0.24,>=0.23.1
    web3<8,>=7.15.0
    aiohttp<4.0.0,>=3.8.5
    asn1crypto<1.5.0,>=1.4.0
    py-ecc<10,>=8
    websocket_client<1,>=0.32.0
    werkzeug==3.1.6
    attrs==25.4.0

extra_pylint_ignored_modules = pandas,numpy,aea_cli_ipfs,compose,multidict,gql

[pytest]
; Opt in to tomte's canonical pytest defaults (integration/e2e markers,
; aea.* DeprecationWarning filter). Plugin is silent without this flag so
; non-fleet `tomte[black]` consumers don't get unexpected config injection.
tomte_defaults = true
; anchorpy 0.20.2 (pulled transitively via open-aea-ledger-solana since
; open-autonomy 0.21.23) ships a pytest plugin with a broken import
; (`from pytest_xprocess import getrootdir` — top-level module is
; `xprocess` in modern pytest-xprocess). Pytest's `-p no:` disables a
; pytest11 entry point before its module is imported; the entry point
; name is `pytest_anchorpy` (per anchorpy's dist-info). No tests in this
; repo use anchorpy fixtures.
addopts = -p no:pytest_anchorpy

; Liccheck whitelist for transitive deps with no PyPI-declared license.
; All three are MIT per their GitHub repos but ship no Trove classifier or
; License field, so liccheck reports them UNKNOWN under PARANOID. Pulled in
; via open-aea-ledger-solana (open-autonomy 0.21.23 / open-aea 2.2.7).
[Authorized Packages]
anchorpy: 0.20.2
based58: 0.1.1
jsonalias: 0.1.1

[mypy]
warn_unused_ignores = False
warn_redundant_casts = False
disable_error_code = redundant-cast,unused-ignore

; Repo-specific overrides (third-party packages synced via IPFS, not lint-clean).
[mypy-packages.valory.connections.*]
ignore_errors = True

[mypy-packages.valory.contracts.*]
ignore_errors = True
ignore_missing_imports = True

[mypy-packages.valory.protocols.*]
ignore_errors = True

[mypy-packages.valory.skills.abstract_abci.*]
ignore_errors = True

[mypy-packages.valory.skills.abstract_round_abci.*]
ignore_errors = True

[mypy-packages.valory.skills.registration_abci.*]
ignore_errors = True
