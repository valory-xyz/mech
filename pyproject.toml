[build-system]
requires = ["uv_build>=0.11.2,<0.12.0"]
build-backend = "uv_build"

[project]
name = "mech"
version = "0.1.0"
description = ""
requires-python = ">=3.10,<3.15"
readme = "README.md"
license = "Apache-2.0"
dependencies = [
    # OA / open-aea / plugins — pinned exactly (framework contract).
    "open-autonomy==0.21.19",
    "open-aea-ledger-ethereum==2.2.1",
    "open-aea-ledger-cosmos==2.2.1",
    "open-aea-test-autonomy==0.21.19",
    "open-aea-cli-ipfs==2.2.1",
    "open-aea-helpers==0.21.19",
    # Framework/lib deps — ranges match upstream open-autonomy v0.21.19.
    "requests>=2.32.5",
    "grpcio==1.78.0",
    "asn1crypto<1.5.0,>=1.4.0",
    "hypothesis>=6",
    "web3<8,>=7.0.0",
    "pytest-asyncio>=1.3",
    "aiohttp<4.0.0,>=3.8.5",
    "certifi",
    "multidict",
    "ecdsa>=0.15",
    "py-ecc<10,>=8",
    "websocket_client<1,>=0.32.0",
    "pytest>=8.2,<10",
    "PyYAML>=6",
    # Mech-specific deps (no OA anchor) — narrow ranges.
    "openai==1.30.2",
    "openapi-core<0.23,>=0.22",
    "openapi-spec-validator>=0.7.0,<0.8.0",
    "prometheus-client>=0.23.1,<0.24",
    "pebble>=5.1,<6",
    "pip>=24.0",
]

[project.urls]
Repository = "https://github.com/valory-xyz/mech"

[dependency-groups]
dev = [
    "setuptools>=78.0.1,<79",
    "tomte[cli, tests] @ git+https://github.com/valory-xyz/tomte.git@ff0ca24f3227e7a1e55f9a56f974e4d2ead88448",
]

[tool.uv]
default-groups = "all"
prerelease = "allow"

[tool.uv.build-backend]
module-name = ["packages"]
module-root = ""


# -- linter configs (folded from .pylintrc per Wave 2a) -----------------------
#
# Folded into pyproject.toml so the repo stops carrying .pylintrc.
# Pylint auto-discovers from pyproject.toml, so the existing tox env
# keeps working without a `--rcfile=` flag change.
#
# Phase 2b's `tomte scaffold tox` will move per-repo `ignored-modules`
# and per-repo `disable=` extras to `[tool.tomte.scaffold]` keys at
# scaffold time (rendered into `--ignored-modules=…` / `--disable=…`
# CLI flags by the scaffolder, per David's review on
# `valory-xyz/tomte#46` — the principle: tomte ships base configs
# only, never enumerates downstream library names). Until then, the
# library list lives here in mech's own pyproject where pylint reads it.

[tool.pylint.master]
ignore-patterns = [".*_pb2.py", "contract_dispatcher.py", "test_abci_messages.py", "test_tendermint_messages.py"]
ignore = ["packages/valory/protocols/abci", "packages/valory/connections/abci/gogoproto"]

[tool.pylint."messages control"]
# C0103 invalid-name; R0801 similar-lines; C0301 line-too-long;
# C0201 consider-iterating-dictionary; C0204 bad-mcs-classmethod-argument;
# C0209 consider-using-f-string; W1203 logging-fstring-interpolation;
# C0302 too-many-lines; R1735 use-dict-literal; R1729 use-a-generator;
# W0511 fixme; E0611 no-name-in-module; R0913 too-many-arguments;
# R0917 too-many-positional-arguments
disable = ["C0103", "R0801", "C0301", "C0201", "C0204", "C0209", "W1203", "C0302", "R1735", "R1729", "W0511", "E0611", "R0913", "R0917"]

[tool.pylint.imports]
ignored-modules = ["pandas", "numpy", "aea_cli_ipfs", "compose", "multidict", "gql", "anthropic", "tiktoken"]

[tool.pylint.design]
max-public-methods = 58
max-args = 6
max-parents = 10
max-branches = 36
max-attributes = 8

[tool.pylint.similarities]
min-similarity-lines = 10
ignore-comments = "yes"
ignore-docstrings = "yes"
ignore-imports = "no"
