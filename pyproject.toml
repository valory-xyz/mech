[build-system]
requires = ["uv_build>=0.11.2,<0.12.0"]
build-backend = "uv_build"

[project]
name = "mech"
version = "0.1.0"
description = ""
requires-python = ">=3.10,<3.15"
readme = "README.md"
license = "Apache-2.0"
dependencies = [
    "open-autonomy==0.21.18",
    "openai==1.30.2",
    "requests==2.32.5",
    "py-multibase==1.0.3",
    "py-multicodec==0.2.1",
    "grpcio==1.78.0",
    "asn1crypto<1.5.0,>=1.4.0",
    "open-aea-ledger-ethereum==2.2.1",
    "open-aea-ledger-cosmos==2.2.1",
    "protobuf>=5,<6",
    "hypothesis==6.151.9",
    "open-aea-test-autonomy==0.21.18",
    "web3<8,>=7.0.0",
    "ipfshttpclient==0.8.0a2",
    "open-aea-cli-ipfs==2.2.1",
    "pytest-asyncio==1.3.0",
    "aiohttp<4.0.0,>=3.8.5",
    "certifi==2026.2.25",
    "multidict==6.7.1",
    "ecdsa>=0.15",
    "eth_typing==5.2.1",
    "hexbytes==1.3.1",
    "packaging==26",
    "py-ecc==8.0.0",
    "pytz==2022.2.1",
    "typing_extensions<=4.15.0,>=3.10.0.2",
    "websocket_client<1,>=0.32.0",
    "toml==0.10.2",
    "eth-abi==5.2.0",
    "pytest>=8.2,<10",
    "eth-utils==5.3.0",
    "pycryptodome==3.20.0",
    "openapi-core==0.22.0",
    "openapi-spec-validator>=0.7.0,<0.8.0",
    "multiaddr==0.0.9",
    "prometheus-client>=0.23.1,<0.24",
    "pebble==5.1.3",
    "PyYAML==6.0.1",
    "prometheus_client==0.23.1",
    "werkzeug==3.1.6",
    "attrs==25.4.0",
    "py-eth-sig-utils==0.4.0",
    "aea-helpers==0.21.18",
    "pip>=24.0",
]

[project.urls]
Repository = "https://github.com/valory-xyz/mech"

[dependency-groups]
dev = [
    "setuptools>=78.0.1,<79",
    "tomte[cli, tests]>=0.6.5",
]

[tool.uv]
default-groups = "all"
prerelease = "allow"

[tool.uv.build-backend]
module-name = ["packages"]
module-root = ""
