[build-system]
requires = ["uv_build>=0.11.2,<0.12.0"]
build-backend = "uv_build"

[project]
name = "mech"
version = "0.1.0"
description = ""
requires-python = ">=3.10,<3.15"
readme = "README.md"
license = "Apache-2.0"
dependencies = [
    "open-autonomy==0.21.19",
    "open-aea-ledger-ethereum==2.2.1",
    "open-aea-ledger-cosmos==2.2.1",
    "open-aea-test-autonomy==0.21.19",
    "open-aea-cli-ipfs==2.2.1",
    "open-aea-helpers==0.21.19",
    "requests>=2.32.5",
    "grpcio==1.78.0",
    "asn1crypto<1.5.0,>=1.4.0",
    "hypothesis>=6",
    "web3<8,>=7.0.0",
    "pytest-asyncio>=1.3",
    "aiohttp<4.0.0,>=3.8.5",
    "certifi",
    "multidict",
    "ecdsa>=0.15",
    "py-ecc<10,>=8",
    "websocket_client<1,>=0.32.0",
    "pytest>=8.2,<10",
    "PyYAML>=6",
    "openai==1.30.2",
    "openapi-core<0.23,>=0.22",
    "openapi-spec-validator>=0.7.0,<0.8.0",
    "prometheus-client>=0.23.1,<0.24",
    "pebble>=5.1,<6",
    "pip>=24.0",
]

[project.urls]
Repository = "https://github.com/valory-xyz/mech"

[dependency-groups]
dev = [
    "setuptools>=78.0.1,<79",
    "tomte[cli, tests] @ git+https://github.com/valory-xyz/tomte.git@7c4eafbadec4e9cadfcf2f5dee4b201f17f69cb9",
]

[tool.uv]
default-groups = "all"
prerelease = "allow"

[tool.tomte]
packages_paths = "packages/valory"
pytest_targets = [
    "packages/valory/skills/mech_abci/tests",
    "packages/valory/skills/task_submission_abci/tests",
    "packages/valory/skills/task_execution/tests",
]
service_specific_packages = [
    "packages/valory/connections/websocket_client",
    "packages/valory/contracts/balance_tracker",
    "packages/valory/contracts/complementary_service_metadata",
    "packages/valory/contracts/hash_checkpoint",
    "packages/valory/contracts/olas_mech",
    "packages/valory/skills/contract_subscription",
    "packages/valory/skills/delivery_rate_abci",
    "packages/valory/skills/mech_abci",
    "packages/valory/skills/task_execution",
    "packages/valory/skills/task_submission_abci",
    "packages/valory/skills/websocket_client",
]
service_public_id = "valory/mech"
known_first_party = "autonomy"
open_autonomy_version = "0.21.19"
open_aea_version = "2.2.1"
check_handlers_ignores = "-i abstract_abci -i contract_subscription -i task_execution -i websocket_client"
local_extensions = "tox.ini"
tomte_dep_pin = " @ git+https://github.com/valory-xyz/tomte.git@7c4eafbadec4e9cadfcf2f5dee4b201f17f69cb9"

[tool.uv.build-backend]
module-name = ["packages"]
module-root = ""
