[build-system]
requires = ["uv_build>=0.11.2,<0.12.0"]
build-backend = "uv_build"

[project]
name = "mech"
version = "0.1.0"
description = ""
requires-python = ">=3.10,<3.15"
readme = "README.md"
license = "Apache-2.0"
dependencies = [
    # OA / open-aea / plugins — pinned exactly (framework contract).
    "open-autonomy==0.21.19",
    "open-aea-ledger-ethereum==2.2.1",
    "open-aea-ledger-cosmos==2.2.1",
    "open-aea-test-autonomy==0.21.19",
    "open-aea-cli-ipfs==2.2.1",
    "open-aea-helpers==0.21.19",
    # Framework/lib deps — ranges match upstream open-autonomy v0.21.19.
    "requests>=2.32.5",
    "grpcio==1.78.0",
    "asn1crypto<1.5.0,>=1.4.0",
    "hypothesis>=6",
    "web3<8,>=7.0.0",
    "pytest-asyncio>=1.3",
    "aiohttp<4.0.0,>=3.8.5",
    "certifi",
    "multidict",
    "ecdsa>=0.15",
    "py-ecc<10,>=8",
    "websocket_client<1,>=0.32.0",
    "pytest>=8.2,<10",
    "PyYAML>=6",
    # Mech-specific deps (no OA anchor) — narrow ranges.
    "openai==1.30.2",
    "openapi-core<0.23,>=0.22",
    "openapi-spec-validator>=0.7.0,<0.8.0",
    "prometheus-client>=0.23.1,<0.24",
    "pebble>=5.1,<6",
    "pip>=24.0",
]

[project.urls]
Repository = "https://github.com/valory-xyz/mech"

[dependency-groups]
dev = [
    "setuptools>=78.0.1,<79",
    "tomte[cli, tests] @ git+https://github.com/valory-xyz/tomte.git@feeea393f0f21fea3f8b6c654cd7b8cf925f30ef",
]

[tool.uv]
default-groups = "all"
prerelease = "allow"

[tool.uv.build-backend]
module-name = ["packages"]
module-root = ""
